# Minimal offline ruleset vendored into the Semgrep adapter image (ADR-012).
# Enough to demonstrate SAST offline; extend or replace with p/security-audit at build time.
rules:
  - id: eaap-python-sql-string-concatenation
    languages: [python]
    severity: ERROR
    message: >
      User input concatenated into a SQL query string enables SQL injection.
      Use parameterized queries instead.
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    patterns:
      - pattern: $CURSOR.execute("..." + $X)
