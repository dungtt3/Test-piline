services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eaap
      POSTGRES_USER: eaap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eaap-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaap -d eaap"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-eaap}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-eaap-dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eaap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eaap-dev-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job that creates the default bucket used by the platform.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-eaap} $${MINIO_ROOT_PASSWORD:-eaap-dev-secret} &&
      mc mb --ignore-existing local/eaap
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eaap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eaap-dev-secret}

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", ":8181", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

  # Reads the trend tables through the read-only grafana_ro role the Phase2 migration created.
  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Password of the read-only DB role; a local-dev default, rotate in real deployments (ADR-010).
      EAAP_GRAFANA_RO_PASSWORD: ${EAAP_GRAFANA_RO_PASSWORD:-grafana-ro-dev}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  miniodata:
  grafanadata:
